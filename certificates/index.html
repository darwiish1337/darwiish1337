<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mohamed Darwish - Licenses & Certifications</title>

    <!-- Stylesheet -->
    <link rel="stylesheet" href="style.css">

    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">

        <!-- ==================== HEADER ==================== -->
        <header class="page-header">
            <div class="header-content">

                <!-- Back Button -->
                <a href="https://github.com/darwiish1337" class="back-link">
                    <i class="fas fa-arrow-left"></i>
                    Back to Profile
                </a>

                <!-- Page Title -->
                <div class="header-title">
                    <h1>Licenses & Certifications</h1>
                    <div class="title-line"></div>
                </div>

            </div>
        </header>

        <!-- ==================== MAIN CONTENT ==================== -->
        <main class="certificates-section">
            <div id="certificates-grid" class="certificates-grid">

                <!-- Loading spinner shown until JS loads certificates -->
                <div class="loading-state">
                    <div class="loader"></div>
                    <p>Loading certificates...</p>
                </div>

            </div>
        </main>

        <!-- ==================== FOOTER ==================== -->
        <footer class="page-footer">
            <p>Total Certificates: <span id="total-count" class="badge">0</span></p>
            <p class="last-updated">Last Updated: <span id="last-updated"></span></p>
        </footer>

    </div>

    <!-- Main Script -->
    <script src="script.js"></script>
</body>
</html>
